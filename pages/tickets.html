<!DOCTYPE html>
<html>
<head>
    <title>Tickets</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #333;
            line-height: 1.6;
        }
        
        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        header h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        
        nav a {
            color: #34495e;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 25px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        nav a:hover {
            background: #3498db;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
        }
        
        section {
            max-width: 1200px;
            margin: 50px auto;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        section h2 {
            color: #2c3e50;
            font-size: 2.2em;
            margin-bottom: 30px;
            text-align: center;
            position: relative;
            padding-bottom: 15px;
        }
        
        section h2:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 4px;
            background: linear-gradient(to right, #e74c3c, #f39c12);
            border-radius: 2px;
        }
        
        ul {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin: 40px 0;
        }
        
        ul li {
            list-style: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            font-size: 1.3em;
            font-weight: 600;
            min-width: 200px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
            border: 2px solid transparent;
        }
        
        ul li:hover {
            transform: translateY(-10px);
            border-color: white;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
        
        form {
            max-width: 600px;
            margin: 40px auto;
            padding: 40px;
            background: #f8f9fa;
            border-radius: 20px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }
        
        label {
            display: block;
            color: #2c3e50;
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="number"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s ease;
        }
        
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="number"]:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }
        
        input[type="submit"] {
            background: linear-gradient(135deg, #e74c3c, #f39c12);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        input[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(231, 76, 60, 0.3);
            background: linear-gradient(135deg, #c0392b, #e67e22);
        }
        
        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 30px;
            margin-top: 50px;
        }
        
        footer p {
            font-size: 1.3em;
            letter-spacing: 2px;
            font-style: italic;
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }
            
            nav {
                gap: 15px;
            }
            
            nav a {
                font-size: 0.9em;
                padding: 6px 15px;
            }
            
            section {
                margin: 20px;
                padding: 20px;
            }
            
            ul li {
                width: 100%;
                font-size: 1.1em;
                padding: 15px;
            }
            
            form {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Festival Tickets</h1>
        <nav>
            <a href="../index.html">Home</a>
            <a href="about.html">About</a>
            <a href="programme.html">Programme</a>
            <a href="tickets.html">Tickets</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    
    <section>
        <h2>Ticket Prices</h2>
        
        <ul>
            <li>Local Adult: M300</li>
            <li>Students: M200</li>
            <li>Children: M150</li>
            <li>International Visitors:M200</li>
        </ul>
        
        <h2>Register for the Festival</h2>
        
        <form>
            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name">
            
            <label>Email</label>
            <input type="email" placeholder="Enter your email address">
            
            <label>Number of Tickets</label>
            <input type="number" placeholder="How many tickets?">
            
            <label>Country</label>
            <input type="text" placeholder="Your country of origin">
            
            <input type="submit" value="Register Now">
        </form>
    </section>
    
    <footer>
        <p>Book Your Adventure Today ❄️</p>
    </footer>
</body>
</html>
